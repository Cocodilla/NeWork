name: Android CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build And Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare local properties
        shell: bash
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          cat <<EOF > API_KEY.properties
          API_KEY=${{ secrets.API_KEY }}
          EOF
          mkdir -p "${HOME}/.gradle"
          cat <<EOF >> "${HOME}/.gradle/gradle.properties"
          MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}
          EOF

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run lint and build debug APK
        run: ./gradlew clean lintDebug assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: warn

  emulator-smoke:
    name: Emulator Smoke Test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare local properties
        shell: bash
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          cat <<EOF > API_KEY.properties
          API_KEY=${{ secrets.API_KEY }}
          EOF
          mkdir -p "${HOME}/.gradle"
          cat <<EOF >> "${HOME}/.gradle/gradle.properties"
          MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}
          EOF

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Boot emulator and launch app
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            adb shell monkey -p ru.netology.nework -c android.intent.category.LAUNCHER 1
            adb shell am force-stop ru.netology.nework
            adb shell monkey -p ru.netology.nework -c android.intent.category.LAUNCHER 1
            sleep 10
            adb exec-out screencap -p > emulator-smoke.png

      - name: Upload emulator screenshot
        uses: actions/upload-artifact@v4
        with:
          name: emulator-smoke
          path: emulator-smoke.png
          if-no-files-found: error
